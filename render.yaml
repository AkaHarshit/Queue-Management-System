services:
  - type: web
    name: queue-management-backend
    env: node
    buildCommand: "cd server && npm install && npm run build"
    startCommand: "cd server && npm start"
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: "" # TODO: Add Vercel URL here
      - key: DB_PATH
        value: "/var/data/queue_management.db"
    disk:
      name: queue-data
      mountPath: /var/data
      sizeGB: 1
